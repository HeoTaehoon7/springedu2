<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>방명록 목록</title>
    <link rel="stylesheet" href="/css/visitor.css" />
    <style>
        table {

        }

    </style>
</head>
<body>
  <h1>방명록 글 리스트</h1>
  <hr>
  <div>
    <table  th:if="${vList}">
      <tr th:each="vo : ${vList}">
        <td>[[${vo.name}]]</td>
        <td>[[${vo.writeDate}]]</td>
        <td>[[${vo.memo}]]</td>
        <td>삭제</td>
        <td>수정</td>
      </tr>
    </table>

    <h3 th:if="${msg}" th:text="${msg}"></h3>
    <hr />
    <a href="/visitorMain.html"><button>메인페이지로 돌아가기</button></a>
  </div>
</body>
</html>
